<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <!-- Canvas Confetti Library for smooth animations -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2d1f3d);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 400px;
            animation: popIn 1s ease-out;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff758c, #ff7eb3, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite alternate;
        }
        .birthday-pic {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 15px;
            margin: 20px 0;
            border: 3px solid #ff7eb3;
        }
        button {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            border: none;
            color: white;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.6);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday! 🥳🎉</h1>
        <p>Click below to unlock your surprise!</p>
        
        <!-- Replace photo.jpg with your actual uploaded image filename if different -->
        <img src="IMG_0879.jpg" alt="Birthday Celebration" class="birthday-pic">
        
        <br>
        <button id="playBtn">🎵 Play Music & Celebrate! 🎈</button>
    </div>

    <!-- Free-use Birthday Background Track -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const button = document.getElementById('playBtn');
        const audio = document.getElementById('bgMusic');

        // Modern browsers block autoplay music, so we trigger it via a button click
        button.addEventListener('click', () => {
            // Play or toggle music
            if (audio.paused) {
                audio.play();
                button.innerText = "⏸️ Pause Music";
            } else {
                audio.pause();
                button.innerText = "🎵 Play Music";
            }

            // Continuous Confetti Burst Effect
            var duration = 5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 }
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        });
    </script>
</body>
</html>
